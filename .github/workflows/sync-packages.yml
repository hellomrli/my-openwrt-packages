name: Sync OpenWrt Packages

on:
  workflow_dispatch:
  schedule:
    - cron: '20 */6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream packages
        run: python3 scripts/sync-packages.py

      - name: Commit changes
        id: commit
        run: |
          if git diff --quiet; then
            echo "No package updates."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "sync: update OpenWrt packages"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger firmware build
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.FIRMWARE_REPO_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "FIRMWARE_REPO_TOKEN is not configured; skip cross-repo build trigger."
            exit 0
          fi

          gh workflow run openwrt-builder.yml             --repo hellomrli/my-ImmortalWrt             --ref main             -f sources=all             -f branches=all
