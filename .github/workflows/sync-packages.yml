name: Sync OpenWrt Packages

on:
  workflow_dispatch:
  schedule:
    - cron: '20 */6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream packages
        run: python3 scripts/sync-packages.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No package updates."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "sync: update OpenWrt packages"
          git push
